<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Funil — Corretor de Leônidas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="debug" content="versao-1307" />
  <style>
    :root {
      --bg-main: #050816;
      --bg-card: #0b1120;
      --bg-card-alt: #020617;
      --gold: #b08d33;
      --gold-soft: #e0c57a;
      --text-muted: #9ca3af;
      --border-soft: #b08d33;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 6px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a 0, #020617 45%, #000 100%);
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 880px;
      margin: 6px auto;
      padding: 10px 12px 14px;
      background: #020617;
      border-radius: 16px;
      box-shadow:
        0 0 0 1px rgba(176, 141, 51, 0.9),
        0 18px 50px rgba(0, 0, 0, 0.85);
      position: relative;
      overflow: hidden;
    }

    .wrapper-inner { position: relative; z-index: 1; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(207, 181, 59, 0.5);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.9), 0 6px 14px rgba(0,0,0,0.9);
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand-text-main {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .brand-text-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .time-info {
      text-align: right;
      font-size: 11px;
      color: var(--text-muted);
    }

    .time-info span { color: var(--gold-soft); }

    h2.section-title {
      margin: 6px 0 4px;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .card {
      background: #020617;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid var(--border-soft);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.9);
      position: relative;
      overflow: hidden;
    }

    .card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .card-main {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 1px;
    }

    .card-main-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold-soft);
    }

    .card-main-suffix { font-size: 12px; color: var(--text-muted); }

    .card-sub { font-size: 10px; color: var(--text-muted); }

    .card-sub strong { color: var(--gold); font-weight: 500; }

    .layout-grid {
      display: grid;
      grid-template-columns: 0.68fr 0.32fr;
      gap: 8px;
      margin-bottom: 6px;
    }

    .panel {
      background: var(--bg-card-alt);
      border-radius: 10px;
      padding: 8px 10px 6px;
      border: 1px solid var(--border-soft);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.9);
      position: relative;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .panel-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--gold);
    }

    .panel-subtitle {
      font-size: 10px;
      color: var(--text-muted);
    }

    .footer-info {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
    }

    .footer-info span { color: var(--gold-soft); }

    .charts-grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 8px;
      margin-top: 6px;
      justify-content: center;
    }

    .charts-grid-3 .panel {
      padding: 8px 8px 8px;
    }

    .layout-grid-funnel {
      display: grid;
      grid-template-columns: 0.6fr 0.4fr;
      gap: 8px;
      margin-bottom: 6px;
    }

    @media (max-width: 1280px) and (min-width: 900px) {
      .cards-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 1024px) {
      .wrapper { max-width: 960px; }
      .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout-grid { grid-template-columns: 1fr; }
      .layout-grid-funnel { grid-template-columns: 1fr; }
      .charts-grid-3 { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      .wrapper {
        margin: 0;
        border-radius: 0;
        max-width: 100%;
        height: 100vh;
        padding: 8px 8px 12px;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .cards-grid { grid-template-columns: 1fr 1fr; }
      .layout-grid { gap: 8px; }
      .layout-grid-funnel { grid-template-columns: 1fr; }
      .charts-grid-3 { grid-template-columns: 1fr; }
    }

    @media (max-height: 800px) {
      body {
        padding-top: 4px;
        padding-bottom: 4px;
      }
      .wrapper {
        margin-top: 4px;
        margin-bottom: 4px;
        padding-top: 8px;
        padding-bottom: 10px;
      }
      .cards-grid { margin-bottom: 6px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="wrapper-inner">
      <!-- ... HTML acima igual ... -->
      <!-- (mantive todo o HTML estrutural exatamente como você mandou) -->
    </div>
  </div>

  <script>
    const csvUrl =
      'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyYxWwXeRzYTue9GuIZaAAEFxWC-1gKPnNev-P5odNDn7QPCWahW-l0JFWGmt8j64qdb2RrHNDQPoM/pub?gid=0&single=true&output=csv';

    // usa ; porque o Sheets PT-BR normalmente exporta com ponto e vírgula
    function parseCSV(text) {
      const lines = text.split('\n').map((l) => l.trim()).filter((l) => l);
      return lines.map((line) => line.split(';'));
    }

    function parseValorBR(valorStr) {
      if (!valorStr) return 0;
      const cleaned = valorStr.replace(/[^0-9,]/g, '').replace('.', '').replace(',', '.');
      const num = parseFloat(cleaned);
      return isNaN(num) ? 0 : num;
    }

    function formatValorBR(num) {
      return 'R$ ' + num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function parseDataBR(dataStr) {
      if (!dataStr) return null;
      const partes = dataStr.split('/');
      if (partes.length !== 3) return null;
      const d = new Date(parseInt(partes[2], 10), parseInt(partes[1], 10) - 1, parseInt(partes[0], 10));
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDataBR(date) {
      return date.toLocaleDateString('pt-BR');
    }

    fetch(csvUrl)
      .then((resp) => resp.text())
      .then((text) => {
        const rows = parseCSV(text);
        if (!rows || rows.length <= 1) {
          return;
        }

        const dataRows = rows.slice(1).filter((r) => r.some((c) => c && c.trim() !== ''));

        // índices ajustados para sua ordem de colunas (10 colunas, 0..9)
        const idxData   = 0; // Data do Lead
        const idxNome   = 1; // Nome
        const idxOrigem = 3; // Origem
        const idxEmp    = 4; // Empreendimento
        const idxStatus = 6; // Status
        const idxValor  = 7; // Valor Previsto
        const idxValorJ = 8; // Comissões (previstas)
        const idxValorK = 9; // Comissão realizada

        const hoje = new Date();
        const trintaDiasAtras = new Date(hoje);
        trintaDiasAtras.setDate(hoje.getDate() - 30);

        let totalLeads = 0;
        let leadsNovos = 0;
        let vgvPotencial = 0;
        let vendasGanhas = 0;
        let ativos = 0;
        let ticketAlto = 0;
        let ultimoLeadData = null;

        let somaValores = 0;
        let qtdeValores = 0;
        let somaValoresJ = 0;
        let qtdeValoresJ = 0;
        let somaValoresK = 0;

        const linhasAtivos = [];

        dataRows.forEach((cols) => {
          totalLeads++;

          const dataStr = cols[idxData] ? cols[idxData].trim() : '';
          const dt = parseDataBR(dataStr);
          if (dt) {
            if (!ultimoLeadData || dt > ultimoLeadData) {
              ultimoLeadData = dt;
            }
            if (dt >= trintaDiasAtras && dt <= hoje) {
              leadsNovos++;
            }
          }

          const valor = parseValorBR(cols[idxValor] || '');
          vgvPotencial += valor;

          if (valor > 0) {
            somaValores += valor;
            qtdeValores++;
          }

          const valorJ = parseValorBR(cols[idxValorJ] || '');
          if (valorJ > 0) {
            somaValoresJ += valorJ;
            qtdeValoresJ++;
          }

          const valorK = parseValorBR(cols[idxValorK] || '');
          if (valorK > 0) {
            somaValoresK += valorK;
          }

          const statusRaw = cols[idxStatus] ? cols[idxStatus].trim() : '';
          const statusLower = statusRaw.toLowerCase();

          if (statusLower.includes('venda ganha') || statusLower.includes('assinado') || statusLower.includes('aprovado')) {
            vendasGanhas++;
          }

          if (!statusLower.includes('perdido') && !statusLower.includes('descartado')) {
            ativos++;
            if (valor >= 800000) {
              ticketAlto++;
            }
            linhasAtivos.push({
              data: dt ? formatDataBR(dt) : dataStr || '-',
              nome: cols[idxNome] || '-',
              origem: cols[idxOrigem] || '-',
              emp: cols[idxEmp] || '-',
              status: statusRaw || '-',
              valor,
            });
          }
        });

        const porStatusLimpo = {};
        linhasAtivos.forEach((linha) => {
          const s = linha.status || 'Sem status';
          porStatusLimpo[s] = (porStatusLimpo[s] || 0) + 1;
        });

        const porEmpreendimento = {};
        dataRows.forEach((cols) => {
          const emp = (cols[idxEmp] || 'Sem empreendimento').trim();
          porEmpreendimento[emp] = (porEmpreendimento[emp] || 0) + 1;
        });

        document.getElementById('card-total-leads').textContent = totalLeads;
        document.getElementById('card-leads-novos').textContent = leadsNovos;
        document.getElementById('card-vgv').textContent = formatValorBR(vgvPotencial);

        const taxaConversao = totalLeads > 0 ? ((vendasGanhas / totalLeads) * 100).toFixed(1) : 0;
        document.getElementById('card-conversao').textContent = taxaConversao + '%';
        document.getElementById('card-vendas-ganhas').textContent =
          vendasGanhas + (vendasGanhas === 1 ? ' venda ganha' : ' vendas ganhas');

        document.getElementById('info-ativos').textContent = ativos;

        const mediaValores = qtdeValores > 0 ? somaValores / qtdeValores : 0;
        document.getElementById('info-ticket-alto').textContent = formatValorBR(mediaValores);

        const mediaValoresJ = qtdeValoresJ > 0 ? somaValoresJ / qtdeValoresJ : 0;
        document.getElementById('info-media-j').textContent = formatValorBR(mediaValoresJ);
        document.getElementById('info-total-comissao').textContent = formatValorBR(somaValoresJ);

        document.getElementById('info-total-linhas').textContent = ativos + ' leads';

        const infoData = document.getElementById('info-data');
        if (infoData) {
          infoData.textContent = formatDataBR(new Date());
        }
        const infoUltimoLead = document.getElementById('info-ultimo-lead');
        if (infoUltimoLead) {
          infoUltimoLead.textContent = ultimoLeadData ? formatDataBR(ultimoLeadData) : '-';
        }

        /* todo o restante (pizzas) igual ao seu código atual */
        // ...
      })
      .catch((err) => {
        console.error('Erro ao carregar CSV', err);
      });
  </script>
</body>
</html>
