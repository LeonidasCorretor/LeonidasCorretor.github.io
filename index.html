<div class="cards-container">
  <div class="cards">
    <div class="card">
      <h3>Negócios com Venda</h3>
      <p id="negocios-venda">0</p>
    </div>
    <div class="card">
      <h3>Negócios Aprovados</h3>
      <p id="negocios-aprovados">0</p>
    </div>
    <div class="card">
      <h3>Comissão Realizada</h3>
      <p id="comissao-realizada">R$ 0,00</p>
    </div>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>Data Atendimento</th>
      <th>Nome Cliente</th>
      <th>Origem</th>
      <th>Empreendimento</th>
      <th>Status Atendimento</th>
      <th>Valor Comissão Realizada</th>
    </tr>
  </thead>
  <tbody id="dados-tabela"></tbody>
</table>

<script>
const urlParams = new URLSearchParams(window.location.search);
const dataInicial = urlParams.get('data_inicial');
const dataFinal = urlParams.get('data_final');
const origemFiltro = urlParams.get('origem');
const campanhaFiltro = urlParams.get('campanha');
const corretorFiltro = urlParams.get('corretor');

const limparFormatoMoeda = (valor) => {
  if (!valor) return 0;
  const limpo = valor
    .toString()
    .replace(/[R$\s]/g, '')
    .replace(/\./g, '')
    .replace(',', '.');
  const numero = parseFloat(limpo);
  return isNaN(numero) ? 0 : numero;
};

const formatarMoedaBR = (valor) => {
  return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
};

const parseDate = (dateStr) => {
  const [dia, mes, ano] = dateStr.split('/');
  return new Date(`${ano}-${mes}-${dia}`);
};

const dataInicialObj = dataInicial ? parseDate(dataInicial) : null;
const dataFinalObj = dataFinal ? parseDate(dataFinal) : null;

// CONTANDO COM A COLUNA A VAZIA NO CSV
let idxData   = 1;  // B - Data Atendimento (2ª coluna do CSV)
let idxNome   = 2;  // C - Nome Cliente    (3ª)
let idxOrigem = 4;  // E - Origem          (5ª)
let idxEmp    = 5;  // F - Empreendimento  (6ª)
let idxStatus = 7;  // H - Status          (8ª)
let idxValor  = 8;  // I - Valor previsto  (9ª) se usar
let idxValorK = 10; // K - Comissão real.  (11ª)

let negociosVenda = 0;
let negociosAprovados = 0;
let comissaoRealizadaTotal = 0;

const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRXo4hzpVQ3e5mBUVGGRQMqaFi7y6u0JXcfYESsOJ8iOjwZz3sI4D2TeF4PZxUiug/pub?gid=213507220&single=true&output=csv';

fetch(url)
  .then(response => response.text())
  .then(data => {
    const rows = data.split('\n').slice(1); // pula cabeçalho
    const tbody = document.getElementById('dados-tabela');
    let html = '';

    rows.forEach(row => {
      if (!row.trim()) return;

      const cols = row.split(',');

      if (cols.length <= idxValorK) return;

      const dataAtendimento   = cols[idxData]?.trim();
      const nomeCliente       = cols[idxNome]?.trim();
      const origem            = cols[idxOrigem]?.trim();
      const empreendimento    = cols[idxEmp]?.trim();
      const statusAtendimento = cols[idxStatus]?.trim();
      const valorKBruto       = cols[idxValorK]?.trim();

      if (!dataAtendimento || !nomeCliente) return;

      const dataAtendimentoObj = parseDate(dataAtendimento);
      if (dataInicialObj && dataAtendimentoObj < dataInicialObj) return;
      if (dataFinalObj && dataAtendimentoObj > dataFinalObj) return;

      if (origemFiltro && origemFiltro !== 'Todos' && origem !== origemFiltro) return;
      if (corretorFiltro && corretorFiltro !== 'Todos' && nomeCliente !== corretorFiltro) return;
      if (campanhaFiltro && campanhaFiltro !== 'Todos' && empreendimento !== campanhaFiltro) return;

      const valorK = limparFormatoMoeda(valorKBruto);

      if (statusAtendimento === 'VENDA') {
        negociosVenda++;
      }

      if (statusAtendimento === 'Aprovado') {
        negociosAprovados++;
      }

      comissaoRealizadaTotal += valorK;

      html += `
        <tr>
          <td>${dataAtendimento}</td>
          <td>${nomeCliente}</td>
          <td>${origem}</td>
          <td>${empreendimento}</td>
          <td>${statusAtendimento}</td>
          <td>${formatarMoedaBR(valorK)}</td>
        </tr>
      `;
    });

    tbody.innerHTML = html;
    atualizarCards();
  })
  .catch(error => {
    console.error('Erro ao carregar os dados:', error);
  });

function atualizarCards() {
  document.getElementById('negocios-venda').textContent = negociosVenda;
  document.getElementById('negocios-aprovados').textContent = negociosAprovados;
  document.getElementById('comissao-realizada').textContent = formatarMoedaBR(comissaoRealizadaTotal);
}
</script>
