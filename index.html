<div class="cards-container">
  <div class="cards">
    <div class="card">
      <h3>Negócios com Venda</h3>
      <p id="negocios-venda">0</p>
    </div>
    <div class="card">
      <h3>Negócios Aprovados</h3>
      <p id="negocios-aprovados">0</p>
    </div>
    <div class="card">
      <h3>Comissão Realizada</h3>
      <p id="comissao-realizada">R$ 0,00</p>
    </div>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Origem</th>
      <th>Empreendimento</th>
      <th>Corretor</th>
      <th>Status</th>
      <th>Comissão realizada</th>
    </tr>
  </thead>
  <tbody id="dados-tabela"></tbody>
</table>

<script>
const urlParams = new URLSearchParams(window.location.search);
const origemFiltro   = urlParams.get('origem');
const campanhaFiltro = urlParams.get('campanha'); // pode ser Empreendimento
const corretorFiltro = urlParams.get('corretor');

const limparFormatoMoeda = (valor) => {
  if (!valor) return 0;
  const limpo = valor
    .toString()
    .replace(/[R$\s]/g, '')
    .replace(/\./g, '')
    .replace(',', '.');
  const numero = parseFloat(limpo);
  return isNaN(numero) ? 0 : numero;
};

const formatarMoedaBR = (valor) => {
  return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
};

// CONTANDO COM A COLUNA A VAZIA NO CSV
// 0: (A vazia), 1: Nome, 2: Telefone, 3: Origem, 4: Empreendimento,
// 5: Corretor, 6: Status, 7: Valor Previsto, 8: Comissões, 9: Comissão realizada
const idxNome        = 1;
const idxOrigem      = 3;
const idxEmpreendimento = 4;
const idxCorretor    = 5;
const idxStatus      = 6;
const idxComissaoRealizada = 9;

let negociosVenda = 0;
let negociosAprovados = 0;
let comissaoRealizadaTotal = 0;

const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRXo4hzpVQ3e5mBUVGGRQMqaFi7y6u0JXcfYESsOJ8iOjwZz3sI4D2TeF4PZxUiug/pub?gid=213507220&single=true&output=csv';

fetch(url)
  .then(response => response.text())
  .then(data => {
    const rows = data.split('\n').slice(1); // pula cabeçalho
    const tbody = document.getElementById('dados-tabela');
    let html = '';

    rows.forEach(row => {
      if (!row.trim()) return;

      const cols = row.split(',');

      if (cols.length <= idxComissaoRealizada) return;

      const nome       = (cols[idxNome] || '').trim();
      const origem     = (cols[idxOrigem] || '').trim();
      const emp        = (cols[idxEmpreendimento] || '').trim();
      const corretor   = (cols[idxCorretor] || '').trim();
      const status     = (cols[idxStatus] || '').trim();
      const comissaoBruto = (cols[idxComissaoRealizada] || '').trim();

      if (!nome) return;

      if (origemFiltro && origemFiltro !== 'Todos' && origem !== origemFiltro) return;
      if (corretorFiltro && corretorFiltro !== 'Todos' && corretor !== corretorFiltro) return;
      if (campanhaFiltro && campanhaFiltro !== 'Todos' && emp !== campanhaFiltro) return;

      const comissao = limparFormatoMoeda(comissaoBruto);

      if (status === 'VENDA') {
        negociosVenda++;
      }

      if (status === 'Aprovado') {
        negociosAprovados++;
      }

      comissaoRealizadaTotal += comissao;

      html += `
        <tr>
          <td>${nome}</td>
          <td>${origem}</td>
          <td>${emp}</td>
          <td>${corretor}</td>
          <td>${status}</td>
          <td>${formatarMoedaBR(comissao)}</td>
        </tr>
      `;
    });

    tbody.innerHTML = html;
    atualizarCards();
  })
  .catch(error => {
    console.error('Erro ao carregar os dados:', error);
  });

function atualizarCards() {
  document.getElementById('negocios-venda').textContent = negociosVenda;
  document.getElementById('negocios-aprovados').textContent = negociosAprovados;
  document.getElementById('comissao-realizada').textContent = formatarMoedaBR(comissaoRealizadaTotal);
}
</script>
